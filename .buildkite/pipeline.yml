agents:
  queue: central
  slurm_mem: 8G
  modules: climacommon/2025_03_18

env:
  JULIA_LOAD_PATH: "${JULIA_LOAD_PATH}:${BUILDKITE_BUILD_CHECKOUT_PATH}/.buildkite"
  OPENBLAS_NUM_THREADS: 1
  SLURM_KILL_BAD_EXIT: 1
  JULIA_NVTX_CALLBACKS: gc
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100
  JULIA_DEPOT_PATH: "${BUILDKITE_BUILD_PATH}/${BUILDKITE_PIPELINE_SLUG}/depot/default"
  COMMON_CONFIG_PATH: "config/common_configs"
  CONFIG_PATH: "config/model_configs"
  GPU_CONFIG_PATH: "config/gpu_configs"
  PERF_CONFIG_PATH: "config/perf_configs"
  MPI_CONFIG_PATH: "config/mpi_configs"

# Trimmed CI for the seed-scaled sparse-autodiff Jacobian draft PR: the sparse
# vs dense accuracy unit test plus three runtime jobs (baroclinic wave sphere,
# a prognostic-EDMF column, and a prognostic-EDMF aquaplanet on GPU). The full
# ClimaAtmos pipeline is intentionally removed here so the draft iterates fast;
# it is restored from git history before merge.
steps:
  - label: "Initialize"
    retry: &retry_policy
      automatic:
        - exit_status: -1  # Retry on agent lost
          limit: 1
    key: "init_cpu_env"
    concurrency: 1
    concurrency_group: "depot/climaatmos-ci"
    command:
      - "echo $$JULIA_DEPOT_PATH"

      - echo "--- Instantiate .buildkite"
      - "julia --project=.buildkite -e 'using Pkg; Pkg.instantiate(;verbose=true); Pkg.precompile(;strict=true); Pkg.status()'"

    agents:
      slurm_cpus_per_task: 8
    env:
      JULIA_NUM_PRECOMPILE_TASKS: 8
      JULIA_MAX_NUM_PRECOMPILE_FILES: 50

  - wait

  - group: "Sparse autodiff Jacobian"
    steps:
      - label: ":microscope: Sparse Jacobian: accuracy vs dense AD (unit test)"
        retry: *retry_policy
        command: >
          julia --color=yes --project=.buildkite
          -e 'include("test/implicit/jacobian_comparison.jl")'
        agents:
          slurm_cpus_per_task: 8
          slurm_mem: 32GB

      - label: ":rocket: Sparse Jacobian: Baroclinic wave sphere"
        retry: *retry_policy
        key: baroclinic_wave_sparse_autodiff
        command: >
          julia --color=yes --project=.buildkite .buildkite/ci_driver.jl
          --config_file $COMMON_CONFIG_PATH/numerics_sphere_he6ze10.yml
          --config_file $CONFIG_PATH/baroclinic_wave_sparse_autodiff.yml
          --job_id baroclinic_wave_sparse_autodiff
        artifact_paths: "baroclinic_wave_sparse_autodiff/output_active/*"

      - label: ":rocket: Sparse Jacobian: Prognostic EDMF Bomex column"
        retry: *retry_policy
        command: >
          julia --color=yes --project=.buildkite .buildkite/ci_driver.jl
          --config_file $CONFIG_PATH/prognostic_edmfx_bomex_column_sparse_autodiff.yml
          --job_id prognostic_edmfx_bomex_column_sparse_autodiff
        artifact_paths: "prognostic_edmfx_bomex_column_sparse_autodiff/output_active/*"
        agents:
          slurm_mem: 20GB

      - label: ":rocket: Sparse Jacobian: Prognostic EDMF aquaplanet sphere, GPU"
        retry: *retry_policy
        command: >
          julia --color=yes --project=.buildkite .buildkite/ci_driver.jl
          --config_file $COMMON_CONFIG_PATH/numerics_sphere_he6ze31.yml
          --config_file $CONFIG_PATH/prognostic_edmfx_aquaplanet_sparse_autodiff.yml
          --job_id prognostic_edmfx_aquaplanet_sparse_autodiff_gpu
        artifact_paths: "prognostic_edmfx_aquaplanet_sparse_autodiff_gpu/output_active/*"
        env:
          CLIMACOMMS_DEVICE: "CUDA"
        agents:
          slurm_gpus: 1
          slurm_mem: 20GB

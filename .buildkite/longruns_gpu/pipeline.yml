agents:
  queue: clima
  slurm_mem: 8G
  modules: climacommon/2025_03_18 nsight-systems/2024.6.1

env:
  JULIA_MPI_HAS_CUDA: "true"
  JULIA_NVTX_CALLBACKS: gc
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100
  OPENBLAS_NUM_THREADS: 1
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  SLURM_KILL_BAD_EXIT: 1
  SLURM_GRES_FLAGS: "allow-task-sharing"
  CONFIG_PATH: "config/model_configs"
  COMMON_CONFIG_PATH: "config/common_configs"
  CLIMAATMOS_GC_NSTEPS: 10

timeout_in_minutes: 1440

steps:
  - label: "init :GPU:"
    key: "init_gpu_env"
    command:
      - echo "--- Instantiate examples"
      - julia --project=.buildkite -e 'using Pkg; Pkg.instantiate(;verbose=true)'
      - julia --project=.buildkite -e 'using Pkg; Pkg.precompile()'
      - julia --project=.buildkite -e 'using CUDA; CUDA.precompile_runtime()'
      - julia --project=.buildkite -e 'using Pkg; Pkg.status()'

    agents:
      slurm_gpus: 1
      slurm_cpus_per_task: 8
    env:
      JULIA_NUM_PRECOMPILE_TASKS: 8
      JULIA_MAX_NUM_PRECOMPILE_FILES: 50

  - wait

  # DERECHO-REPRO PROBE: run the three 120-day configs that NaN'd on Derecho
  # (day 44 / 59) on the clima CI cluster, to confirm the crash is the Derecho
  # environment and not the code/Beres. Same numerics merge as the production
  # longruns; configs live in config/model_configs (CONFIG_PATH overridden above).
  - group: "Derecho repro: GW bisection longruns"
    steps:
      - label: ":computer: aquaplanet 0M + full Beres NOGW (crashed Derecho day ~44)"
        command: >
          srun julia --color=yes --project=.buildkite .buildkite/ci_driver.jl
          --config_file $COMMON_CONFIG_PATH/numerics_sphere_he16ze63.yml --config_file $CONFIG_PATH/$$JOB_NAME.yml
          --job_id $$JOB_NAME
        artifact_paths: "$$JOB_NAME/output_active/*"
        agents:
          slurm_gpus: 1
          slurm_time: 24:00:00
        env:
          CLIMACOMMS_DEVICE: "CUDA"
          JOB_NAME: "aquaplanet_beres_verify_120d"

      - label: ":computer: aquaplanet 0M + GW OFF control (crashed Derecho day ~59)"
        command: >
          srun julia --color=yes --project=.buildkite .buildkite/ci_driver.jl
          --config_file $COMMON_CONFIG_PATH/numerics_sphere_he16ze63.yml --config_file $CONFIG_PATH/$$JOB_NAME.yml
          --job_id $$JOB_NAME
        artifact_paths: "$$JOB_NAME/output_active/*"
        agents:
          slurm_gpus: 1
          slurm_time: 24:00:00
        env:
          CLIMACOMMS_DEVICE: "CUDA"
          JOB_NAME: "aquaplanet_noGW_120d"

      - label: ":computer: aquaplanet 0M + NOGW AD99 only, no Beres"
        command: >
          srun julia --color=yes --project=.buildkite .buildkite/ci_driver.jl
          --config_file $COMMON_CONFIG_PATH/numerics_sphere_he16ze63.yml --config_file $CONFIG_PATH/$$JOB_NAME.yml
          --job_id $$JOB_NAME
        artifact_paths: "$$JOB_NAME/output_active/*"
        agents:
          slurm_gpus: 1
          slurm_time: 24:00:00
        env:
          CLIMACOMMS_DEVICE: "CUDA"
          JOB_NAME: "aquaplanet_AD99only_120d"

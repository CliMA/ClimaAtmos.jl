# Single-run EKI slice; use `scripts/sweep_forward_runs.jl` for N_quad × varfix grids.
case_name: TRMM_LBA
model_config_path: model_configs/trmm_column_varquad.yml
# Baseline SCM TOML inside ClimaAtmos.jl/toml/
scm_toml: prognostic_edmfx_implicit_scm_calibrated_5_cases_shallow_deep_v1.toml
output_dir: simulation_output/calibration/TRMM_LBA/N_3/varfix_off/eki
ensemble_size: 6
n_iterations: 2
prior_path: prior.toml
quadrature_order: 3
sgs_quadrature_subcell_geometric_variance: false
# Reference observation vector (generate with `generate_observations_reference.jl`)
observations_path: observations_reference.jld2
observation_noise_std: 0.05
calibration_mode: calibrated_varfix_off
# Expected git branch for edits (warn only)
expected_git_branch: jb/variance_adjustments

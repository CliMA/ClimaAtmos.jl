# TRMM_LBA prognostic EDMF column, equilibrium 0M, SGS quadrature cloud + microphysics.
# Paths to `toml` are filled in `model_interface.jl` (ClimaAtmos repo + member parameters).
initial_condition: TRMM_LBA
turbconv: prognostic_edmfx
implicit_diffusion: true
implicit_sgs_advection: true
implicit_sgs_entr_detr: true
implicit_sgs_nh_pressure: true
implicit_sgs_vertdiff: true
implicit_sgs_mass_flux: true
approximate_linear_solve_iters: 2
max_newton_iters_ode_subproblem: 3
max_newton_iters_ode: 1
edmfx_entr_model: "PiGroups"
edmfx_detr_model: "SmoothArea"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true
prognostic_tke: true
cloud_model: quadrature
microphysics_model: "0M"
use_sgs_quadrature: true
sgs_distribution: lognormal
quadrature_order: 3
sgs_quadrature_subcell_geometric_variance: false
config: column
z_max: 16400
x_elem: 2
y_elem: 2
z_elem: 82
z_stretch: false
dz_bottom: 30
dt: 150secs
t_end: 12hours
toml: []
netcdf_interpolation_num_points: [8, 8, 82]
diagnostics:
  - short_name: [ts, ta, thetaa, ha, pfull, rhoa, hur, hus, cl, clw, cli]
    period: 10mins
  - short_name: [waen, taen, thetaaen, haen, husen, huren, clwen, clien, tke]
    period: 10mins
ode_algo: "ARS222"
output_default_diagnostics: false

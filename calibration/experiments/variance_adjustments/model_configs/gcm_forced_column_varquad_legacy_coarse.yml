# **Non-operational archive (coarse mesh):** not used by checked-in study YAMLs. Operational
# truth / EKI / sweeps use `gcm_forced_column_varquad_hires.yml`. Keep this file only for
# bisects or explicit A/B vs older `z_elem: 60` configs.
#
# Portable default: same HadGEM2-A AMIP July forcing as `config/model_configs/prognostic_edmfx_gcmdriven_column.yml`.
# The `cfsite_gcm_forcing` artifact is **one** NetCDF (see CliMA/ClimaArtifacts `cfsite_gcm_forcing/README.md`):
# HadGEM2-A, AMIP, July 2004–2008, with **all** cfSites as groups in that file — there is nothing else
# in the artifact to “randomly” pick among for forcing. Case diversity is **`cfsite_number`** (and matching
# `les_truth.cfsite` + LES stats), optionally chosen with a fixed RNG seed when generating experiment YAMLs.
# Override per machine: env `VA_GCM_FORCING_FILE` → absolute path (see `model_interface.jl`).
initial_condition: GCM
external_forcing_file: artifact"cfsite_gcm_forcing"/HadGEM2-A_amip.2004-2008.07.nc
# Set at runtime from `les_truth.cfsite` in each experiment YAML. Must match NetCDF groups (`site4`, `site23`, …).
cfsite_number: "site4"
turbconv: prognostic_edmfx
tracer_upwinding: first_order
implicit_diffusion: true
implicit_sgs_advection: true
implicit_sgs_entr_detr: true
implicit_sgs_nh_pressure: true
implicit_sgs_vertdiff: true
implicit_sgs_mass_flux: true
approximate_linear_solve_iters: 2
max_newton_iters_ode_subproblem: 3
max_newton_iters_ode: 1
edmfx_entr_model: "PiGroups"
edmfx_detr_model: "SmoothArea"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true
prognostic_tke: true
cloud_model: quadrature
microphysics_model: "1M"
use_sgs_quadrature: true
sgs_distribution: lognormal
quadrature_order: 3
sgs_quadrature_subcell_geometric_variance: false
config: column
z_max: 40000
x_elem: 2
y_elem: 2
z_elem: 60
z_stretch: true
dz_bottom: 30
dt: 10secs
t_end: 6hours
toml: []
netcdf_interpolation_num_points: [2, 2, 60]
diagnostics:
  - short_name: [hus, thetaa, clw, cli, lwp, clivi]
    period: 10mins
ode_algo: "ARS222"
output_default_diagnostics: false

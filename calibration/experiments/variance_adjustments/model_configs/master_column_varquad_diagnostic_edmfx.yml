# Shared physics + diagnostics for variance_adjustments column runs (diagnostic EDMF + quadrature + 1M).
# Case overlays only set forcing, initial condition, vertical mesh, integration time, and case-specific numerics.
turbconv: diagnostic_edmfx
tracer_upwinding: first_order
implicit_diffusion: true
approximate_linear_solve_iters: 2
max_newton_iters_ode_subproblem: 3
max_newton_iters_ode: 1
edmfx_entr_model: "PiGroups"
edmfx_detr_model: "SmoothArea"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: false
edmfx_filter: false
prognostic_tke: true
cloud_model: quadrature
microphysics_model: "1M"
use_sgs_quadrature: true
sgs_distribution: lognormal
# When the forward sweep sets **varfix_on**, `scripts/sweep_forward_core.jl` uses this full string if present;
# otherwise it maps `lognormal` -> `lognormal_vertical_profile` only. Swap to any vertical-profile / 3D
# variant documented under `sgs_distribution` in `config/default_configs/default_config.yml`, e.g.:
#   *_vertical_profile_full_cubature, *_vertical_profile_lhs_z, *_vertical_profile_principal_axis,
#   *_vertical_profile_voronoi, *_vertical_profile_barycentric, *_vertical_profile_inner_bracketed,
#   *_vertical_profile_inner_halley, *_vertical_profile_inner_chebyshev, …
# To run **several** varfix-on discretizations in one sweep, add `forward_sweep_varfix_on_distributions:` (list of
# strings) on a case overlay — see `model_configs/trmm_column_varquad_hires.yml`.
sgs_distribution_varfix_on: lognormal_vertical_profile_full_cubature
quadrature_order: 3
config: column
x_elem: 2
y_elem: 2
toml: []
ode_algo: "ARS222"
output_default_diagnostics: false
# Match `default_diagnostics(::DiagnosticEDMFX, ...)` in ClimaAtmos: draft (`*up`) + env (`waen`, `tke`, `lmix` only).
# Prognostic EDMF env names (`taen`, `haen`, `husen`, …) are not written for diagnostic EDMF — listing them caused
# empty SimDir lookups and noisy plot warnings.
diagnostics:
  - short_name: [ts, ta, thetaa, ha, pfull, rhoa, hur, hus, cl, clw, cli]
    period: 10mins
  - short_name: [arup, rhoaup, waup, taup, thetaaup, haup, husup, hurup, clwup, cliup]
    period: 10mins
  - short_name: [waen, tke, lmix]
    period: 10mins
  - short_name: [lwp, clivi]
    period: 10mins

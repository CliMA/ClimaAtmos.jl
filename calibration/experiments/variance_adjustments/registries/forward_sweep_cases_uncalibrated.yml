# Uncalibrated forward grid: **no EKI** — use **`scripts/sweep_forward_runs.jl --baseline-scm-forward`**
# (merged `diagnostic_edmfx_1M.toml` + optional `toml/uncalibrated_stability_overlay.toml` only).
# Rows omit **`eki_varfix_off_config`**. For analysis, treat the **finest vertical tier** at **`N_quad=3`**, **`varfix_off`**
# as a stand-in “truth” when comparing to coarser runs (no LES observations involved).
#
# **HadGEM2-A GCM cfSite artifact columns** were removed (broken in this study). Use GoogleLES + idealized SCMs.
cases:
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/trmm_column_varquad_hires.yml
    scm_toml:
      - diagnostic_edmfx_1M.toml
      - toml/uncalibrated_stability_overlay.toml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/dycoms_rf01_column_varquad_hires.yml
    scm_toml:
      - diagnostic_edmfx_1M.toml
      - toml/uncalibrated_stability_overlay.toml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/dycoms_rf02_column_varquad_hires.yml
    scm_toml:
      - diagnostic_edmfx_1M.toml
      - toml/uncalibrated_stability_overlay.toml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/bomex_column_varquad_hires.yml
    scm_toml:
      - diagnostic_edmfx_1M.toml
      - toml/uncalibrated_stability_overlay.toml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/gabls_column_varquad_hires.yml
    scm_toml:
      - diagnostic_edmfx_1M.toml
      - toml/uncalibrated_stability_overlay.toml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/googleles_column_varquad_hires.yml

# Default EKI-parameter forward sweep (`sweep_forward_runs.jl` / `run_full_study.jl` when not using
# `--uncalibrated-study` and not overriding `--forward-registry=`).
#
# **GoogleLES / CloudBench** (`googleles_column_varquad_hires.yml` + `experiment_config_googleles_*`) is **not** listed
# here: that track is still under development / verification. To run it, use a custom registry or add rows locally.
#
# HadGEM2-A GCM cfSite columns are not part of this default set. This file matches
# `va_idealized_calibration_sweep_configs()` in `lib/calibration_sweep_configs.jl` (TRMM, DYCOMS, BOMEX, GABLS).
#
# `scm_toml` is used for **`--baseline-scm-forward`** only; EKI cells use merged member TOMLs from
# `eki_varfix_off_config`.
cases:
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/trmm_column_varquad_hires.yml
    scm_toml: prognostic_edmfx.toml
    eki_varfix_off_config: experiment_configs/experiment_config_trmm_N3_varfix_off.yml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/dycoms_rf01_column_varquad_hires.yml
    scm_toml: prognostic_edmfx.toml
    eki_varfix_off_config: experiment_configs/experiment_config_dycoms_rf01_N3_varfix_off.yml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/dycoms_rf02_column_varquad_hires.yml
    scm_toml: prognostic_edmfx.toml
    eki_varfix_off_config: experiment_configs/experiment_config_dycoms_rf02_N3_varfix_off.yml
  - model_config_path:
      - model_configs/master_column_varquad_diagnostic_edmfx.yml
      - model_configs/bomex_column_varquad_hires.yml
    scm_toml: prognostic_edmfx.toml
    eki_varfix_off_config: experiment_configs/experiment_config_bomex_N3_varfix_off.yml
  # GABLS has no cloud rn
  # - model_config_path:
  #     - model_configs/master_column_varquad_diagnostic_edmfx.yml
  #     - model_configs/gabls_column_varquad_hires.yml
  #   scm_toml: prognostic_edmfx.toml
  #   eki_varfix_off_config: experiment_configs/experiment_config_gabls_N3_varfix_off.yml

# Small subset for pipeline testing; extend with gcm_driven_scm priors as needed.
# Section names must be valid ClimaParams keys in the merged TOML (base `scm_toml` + defaults).
[entr_inv_tau]
prior = "constrained_gaussian(entr_inv_tau, 0.0001, 1e-5, 0, Inf)"
type = "float"

[mixing_length_eddy_viscosity_coefficient]
prior = "constrained_gaussian(mixing_length_eddy_viscosity_coefficient, 0.14, 0.09, 0, Inf)"
type = "float"

[diagnostic_covariance_coeff]
prior = "constrained_gaussian(diagnostic_covariance_coeff, 2.1, 1.0, 0, Inf)"
type = "float"

[EDMF_surface_area]
prior = "constrained_gaussian(EDMF_surface_area, 0.1, 0.03, 0, Inf)"
type = "float"

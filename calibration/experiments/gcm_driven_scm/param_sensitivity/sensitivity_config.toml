# =============================================================================
# Parameter Groups (coupled parameters that change together)
# =============================================================================
# Each group specifies parameters that should have the same value in a sweep.
# The first parameter in the group is the "driver" - its sweep values are used.
# All other parameters in the group take on the same values.

# Coupled parameters: both use the same sweep values (from entr_inv_tau)
# and only one set of simulations is run for the pair.

# [groups.inv_tau_group]
parameters = ["entr_inv_tau", "detr_inv_tau"]


agents:
  queue: central
  slurm_mem: 8G
  modules: climacommon/2025_03_18
env:
  OPENBLAS_NUM_THREADS: 1
  SLURM_KILL_BAD_EXIT: 1
  JULIA_NVTX_CALLBACKS: gc
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100
  JULIA_DEPOT_PATH: "${BUILDKITE_BUILD_PATH}/${BUILDKITE_PIPELINE_SLUG}/${BUILDKITE_BUILD_NUMBER}/depot:${BUILDKITE_BUILD_PATH}/${BUILDKITE_PIPELINE_SLUG}/depot/shared"

steps:
  - label: "init :computer:"
    key: "init_cpu_env"
    concurrency: 1
    concurrency_group: 'depot/climaatmos-calibration'
    command:
      - "echo $$JULIA_DEPOT_PATH"

      - echo "--- Instantiate calibration/experiments/perfect_scm"
      - "julia --project=calibration/experiments/perfect_scm -e 'using Pkg; Pkg.instantiate(;verbose=true); Pkg.develop(;path=\".\")'"
      - "julia --project=calibration/experiments/perfect_scm -e 'using Pkg; Pkg.precompile()'"
      - "julia --project=calibration/experiments/perfect_scm -e 'using Pkg; Pkg.status()'"

    agents:
      slurm_cpus_per_task: 8
    env:
      JULIA_NUM_PRECOMPILE_TASKS: 8
      JULIA_MAX_NUM_PRECOMPILE_FILES: 50

  - wait

  - group: "Calibration"
    steps:
      - label: "end to end test"
        command: julia --project=calibration/experiments/perfect_scm calibration/experiments/perfect_scm/run_calibration.jl
        agents:
          slurm_ntasks: 1
          slurm_cpus_per_task: 1
          slurm_mem: 32GB
          slurm_time: 00:45:00
        artifact_paths: "perfect_scm_calibration/plots/*"

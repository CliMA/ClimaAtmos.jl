# Minimal sphere integration test for Beres squall-line forcing.
# Inherits physics from longrun_aquaplanet_allsky_diagedmf_0M.yml
# but uses a coarse phase-speed grid (nc=51) for fast compilation.
# sigma_x = 2500 m matches Beres (2004) Section 4 squall-line case.
toml: [toml/longrun_aquaplanet_diagedmf.toml, toml/nogw_beres_test.toml]
beres_sigma_x: 2500.0

z_max: 60000.0
z_elem: 63
dz_bottom: 30.0
h_elem: 12
rayleigh_sponge: true
dt: "30secs"
t_end: "30mins"
dt_save_state_to_disk: "24hours"
initial_condition: DYAMONDSummer
#discrete_hydrostatic_balance: true

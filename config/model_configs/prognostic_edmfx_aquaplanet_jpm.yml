# Aquaplanet run of the 13-reaction Julia Photochemical Mechanism (JPM,
# Sturm & Silva 2025) via config/chemistry_configs/jpm.json. Structure mirrors
# the ABBA/EDDE aquaplanet jobs; initial concentrations for the 15 gas species
# come from the DecayingProfile setup (typical-urban values, kg/kg).
z_max: 30000.0
z_elem: 10
dz_bottom: 500.0
dt: 20secs
surface_setup: DefaultMoninObukhov
rad: clearsky
turbconv: prognostic_edmfx
prognostic_tke: true
edmfx_entr_model: "Generalized"
edmfx_detr_model: "Generalized"
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
implicit_diffusion: true
approximate_linear_solve_iters: 2
microphysics_model: "0M"
chemistry_model: "passive"
chemistry_config: "config/chemistry_configs/jpm.json"
t_end: 4hours
dt_save_state_to_disk: 600secs
toml: [toml/prognostic_edmfx.toml]
output_default_diagnostics: false
diagnostics:
  - short_name: [ts, ta, thetaa, ha, pfull, rhoa, ua, va, wa, hfss, hfls, hur, hus, cl, clw, cli, evspsbl, pr, rsd, rsu, rld, rlu]
    reduction_time: average
    period: 1hours
  - short_name: [q_gas_O3, q_gas_NO, q_gas_NO2, q_gas_HCHO, q_gas_HO2, q_gas_H2O2, q_gas_OH, q_gas_HNO3, q_gas_CO, q_gas_H2, q_gas_ALD2, q_gas_MGLY, q_gas_MCO3, q_gas_PAN, q_gas_H2O,
                 q_gas_O3up, q_gas_NOup, q_gas_NO2up, q_gas_HCHOup, q_gas_HO2up, q_gas_H2O2up, q_gas_OHup, q_gas_HNO3up, q_gas_COup, q_gas_H2up, q_gas_ALD2up, q_gas_MGLYup, q_gas_MCO3up, q_gas_PANup, q_gas_H2Oup]
    reduction_time: average
    period: 1hours
  - short_name: [q_gas_O3, q_gas_NO, q_gas_NO2, q_gas_HCHO, q_gas_HO2, q_gas_H2O2, q_gas_OH, q_gas_HNO3, q_gas_CO, q_gas_H2, q_gas_ALD2, q_gas_MGLY, q_gas_MCO3, q_gas_PAN, q_gas_H2O, rhoa, wa, ua]
    period: 1mins
ode_algo: "ARS222"


config: sphere
h_elem: 6 # 550 km
nh_poly: 3
hyperdiff: Hyperdiffusion
rayleigh_sponge: true
viscous_sponge: true
max_newton_iters_ode: 1

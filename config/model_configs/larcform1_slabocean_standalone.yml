# Larcform1 standalone slab-ocean run (paired with larcform1_slabocean_coupled.yml)
# edonly EDMFX, 1M microphysics, quadrature SGS clouds.
# Pithan 2016 Arctic SCM column at 80°N, slab ocean h=1m.

# job setup
job_id: lf1_slab_standalone
FLOAT_TYPE: "Float64"

# Atmosphere
initial_condition: Larcform1
rayleigh_sponge: true

# Surface
prognostic_surface: SlabOceanSST
surface_setup: DefaultMoninObukhov
disable_surface_flux_tendency: false

# Temporal
start_date: "20010101"
t_end: 20days
dt: 30secs
dt_rad: 30secs

# Spatial — column SCM (Pithan 80°N is enforced via the coupled config; standalone
config: "column"
z_max: 9000.0
z_elem: 90
z_stretch: true
dz_bottom: 20.0
x_elem: 1
y_elem: 1
h_elem: 6 # This is for the cubed sphere and shouldn't impact SCM

# Solver
approximate_linear_solve_iters: 2
ode_algo: ARS343
implicit_microphysics: true

# Parameters
toml: [toml/larcform1_1M_edonly_edmfx.toml]

# Radiation
rad: allskywithclear
insolation: larcform1

# Turbulence and EDMF (edonly)
turbconv: edonly_edmfx
implicit_diffusion: false
implicit_sgs_advection: false
edmfx_entr_model: "Generalized"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true

# Clouds — quadrature SGS clouds
cloud_model: quadrature
microphysics_model: 1M

# Logging and Diagnostics
log_to_file: true
check_conservation: false
netcdf_output_at_levels: true
output_default_diagnostics: false

diagnostics:
  - short_name: [ta, thetaa, pfull, rhoa, hus, hur, ts, tas]
    period: 1hours
    reduction_time: average
  - short_name: [ua, va, wa]
    period: 1hours
    reduction_time: average
  - short_name: [cl, clw, cli, lwp, clivi]
    period: 1hours
    reduction_time: average
  - short_name: [rlu, rld, rlut, rlus, rlds, rsdt, rlutcs, rldscs]
    period: 1hours
    reduction_time: average
  - short_name: [pr, prsn, evspsbl, husra, hussn]
    period: 1hours
    reduction_time: average
  - short_name: [hfss, hfls]
    period: 1hours
    reduction_time: average
  - short_name: [tke, lmix, bgrad, strain, edt, evu]
    period: 10mins
    reduction_time: average

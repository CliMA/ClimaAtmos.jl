# 120-day aquaplanet BISECTION step: NOGW (AD99 background) ON, but the Beres
# convective source OFF. Used after the GW-off control to tell whether the
# day~44 NaN blowup comes from the AD99 background or specifically from the
# (un-retuned, ~10-100x stronger) Beres in-cloud source. Identical to
# aquaplanet_beres_verify_120d.yml except nogw_beres_source is false; the
# Beres-only diagnostics are removed (AD99 has no Beres fields), but utendnogw/
# vtendnogw are kept so the AD99 drag is still recorded.
ode_algo: "ARS222"
dt: "120secs"
t_end: "120days"
dt_save_state_to_disk: "30days"
rad: "allskywithclear"
dt_rad: "1hours"
surface_setup: "DefaultMoninObukhov"
turbconv: "prognostic_edmfx"
prognostic_tke: true
edmfx_entr_model: "Generalized"
edmfx_detr_model: "Generalized"
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
microphysics_model: "0M"
non_orographic_gravity_wave: true
dt_nogw: "400secs"
nogw_beres_source: false
toml: [toml/longrun_aquaplanet_progedmf.toml]
diagnostics:
  - short_name: [utendnogw, vtendnogw]
    period: 1days
  - short_name: [arup, waup, taup, haup]
    period: 1days
  - short_name: [ha, ta, rhoa, pr]
    period: 1days

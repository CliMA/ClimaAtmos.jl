# Larcform1 — Arctic winter boundary layer SCM (Pithan et al. 2016)
# 1-moment microphysics, prognostic EDMFx
#==========================================================================================#
# Atmosphere #
initial_condition: Larcform1
rayleigh_sponge: true

# Surface #
prognostic_surface: SlabOceanSST     # placeholder until EisenmanSeaIce is implemented
surface_setup: DefaultMoninObukhov
disable_surface_flux_tendency: false

# Numerics
#==========================================================================================#

# Temporal
t_end: 20days
dt: 30secs
dt_rad: 30secs

# Spatial #
config: "column"
z_max: 9000.0
z_elem: 90
z_stretch: true
dz_bottom: 10.0
x_elem: 1
y_elem: 1

# Solver #
approximate_linear_solve_iters: 2
ode_algo: ARS222

# Model Components
#==========================================================================================#

# Parameters #
toml: [toml/prognostic_edmfx.toml, toml/larcform1_1M_prognostic_edmfx.toml]

# Radiation #
rad: allskywithclear
insolation: larcform1

# Turbulence and EDMF #
turbconv: prognostic_edmfx
implicit_diffusion: false
edmfx_entr_model: "Generalized"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true

# Clouds #
cloud_model: grid_scale
microphysics_model: 1M

# Logging and Diagnostics
#==========================================================================================#
log_to_file: true
check_conservation: false
netcdf_output_at_levels: true
output_default_diagnostics: false

diagnostics:
#== Atmospheric State ==#
  - short_name: [ta, thetaa, pfull, rhoa, hus, hur, ts, tas]
    period: 1hours
    reduction_time: average
#== Winds & Dynamics ==#
  - short_name: [ua, va, wa]
    period: 1hours
    reduction_time: average
#== Clouds & Condensates ==#
  - short_name: [cl, clw, cli, lwp, clivi]
    period: 1hours
    reduction_time: average
#== Radiation Fluxes ==#
  - short_name: [rlu, rld, rlut, rlus, rlds, rsdt, rlutcs, rldscs]
    period: 1hours
    reduction_time: average
#== Precipitation & Evaporation ==#
  - short_name: [pr, prsn, evspsbl, husra, hussn]
    period: 1hours
    reduction_time: average
#== Surface Heat Fluxes ==#
  - short_name: [hfss, hfls]
    period: 1hours
    reduction_time: average
#== Convective Updrafts ==#
  - short_name: [arup, waup, taup, thetaaup, haup, husup, hurup, clwup, cliup, husraup, hussnup]
    period: 10mins
    reduction_time: average
#== Convective Environment ==#
  - short_name: [waen, taen, thetaaen, haen, husen, huren, clwen, clien, husraen, hussnen, tke]
    period: 10mins
    reduction_time: average
#== EDMF & Turbulence Diagnostics ==#
  - short_name: [entr, detr, lmix, bgrad, strain, edt, evu]
    period: 10mins
    reduction_time: average

# Larcform1 — Arctic winter boundary layer SCM (Pithan et al. 2016)
# 1-moment microphysics, prognostic EDMFx

job_id: larcform1_1M_prognostic_edmfx_base  # Decides file names and output dir if default location is used
reference_job_id: larcform1                 # Decides ci plotting

#==========================================================================================#
# Atmosphere #
initial_condition: Larcform1
rayleigh_sponge: false

# Surface #
prognostic_surface: SlabOceanSST            # overwritten to 250K. Using this for now instead of couping to sea ice model
surface_setup: DefaultMoninObukhov
disable_surface_flux_tendency: false

# Numerics
#==========================================================================================#

# Temporal
FLOAT_TYPE: Float32
t_end: 2days
dt: 30secs
dt_rad: 30mins  # 5mins→30mins validated 2026-07-04 (lf1e-scm-speedtest-1 s2/s5: rlds −0.4 W/m², onset +1 h)

# Spatial #
config: "column"
z_max: 9000.0
z_elem: 90
z_stretch: false
dz_bottom: 10.0

# Solver #
approximate_linear_solve_iters: 2
ode_algo: ARS222

# Model Components
#==========================================================================================#

# Parameters #
toml: [toml/larcform1_1M_prognostic_edmfx.toml]

# Radiation #
rad: allskywithclear
insolation: larcform1

# Turbulence and EDMF #
#vert_diff: DecayWithHeightDiffusion
turbconv: prognostic_edmfx
implicit_diffusion: true
edmfx_entr_model: "Generalized"
edmfx_detr_model: "Generalized"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true
prognostic_tke: true
hyperdiff: ~

# Clouds #
cloud_model: quadrature             # [`grid_scale`, `quadrature` (default), `MLCloud`]"
microphysics_model: 1M

# Logging and Diagnostics
#==========================================================================================#
log_to_file: true
check_conservation: false
netcdf_output_at_levels: true
output_default_diagnostics: false

# Minimal set: exactly what scripts/convert_to_pithan.py consumes. Accumulated-
# average diagnostics are computed every timestep, and the previous 10-min
# EDMF/microphysics-tendency groups (54 vars) dominated runtime (~90% — see
# "experiments/scm speed tests/lf1e-scm-speedtest-1.md", 2026-07-04). The full
# debugging set is in git history; restore per-experiment via overlay if needed.
diagnostics:
  - short_name: [ta, pfull, rhoa, hus, hur, ua, va, cl, clw, cli, lwp, clivi]
    period: 1hours
    reduction_time: average
  - short_name: [ts, rlds, rlus, rlut, pr, prsn, hfss, hfls]
    period: 1hours
    reduction_time: average

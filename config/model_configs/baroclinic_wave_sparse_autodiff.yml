dt_save_state_to_disk: "1days"
initial_condition: "DryBaroclinicWave"
use_auto_jacobian: true
# Run the measured padding mode. runtime_remeasure starts from the
# transient-safety constant mask, then switches to the lean measured mask of
# the developed state; debug_jacobian prints the Layer 1 dense-vs-constant and
# dense-vs-measured comparison at the final state.
auto_jacobian_padding_mode: measured
auto_jacobian_runtime_remeasure: true
update_jacobian_every: dt
debug_jacobian: true
t_end: "2days"
disable_surface_flux_tendency: true
diagnostics:
  - short_name: [pfull, ua, wa, va, rv, ta, ke]
    period: 1days
  - short_name: [pfull, ua, wa, va, rv, ta, ke]
    period: 1days
    writer: h5

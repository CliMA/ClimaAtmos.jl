z_max: 60000.0
z_elem: 31
dz_bottom: 50.0
rayleigh_sponge: true
dt: "360secs"
t_end: "1days"
dt_save_state_to_disk: "24hours"
vert_diff: "DecayWithHeightDiffusion"
implicit_diffusion: true
approximate_linear_solve_iters: 2
moist: "nonequil"
precip_model: "1M"
rad: "allskywithclear"
aerosol_radiation: true
prescribe_clouds_in_radiation: true
radiation_reset_rng_seed: true
insolation: "timevarying"
non_orographic_gravity_wave: true
orographic_gravity_wave: "gfdl_restart"
surface_setup: "DefaultMoninObukhov"
prescribe_ozone: true
reproducibility_test: true
prescribed_aerosols: ["SO4", "CB1", "OC1", "DST01", "SSLT01"]
toml: [toml/sphere_aquaplanet_1M.toml]
diagnostics:
  - short_name: [edt, evu, mmrso4, mmrbcpo, mmrocpo, mmrdust, mmrss, loadss, o3, od550aer, odsc550aer]
    reduction_time: average
    period: 1days
  - short_name: [reffclw, reffcli]
    period: 6hours
  - short_name: [accr_sno_ice, accr_rai_liq, acnv_ice_sno, acnv_liq_rai, accr_sno_liq_sno_part]
    period: 6hours
  - short_name: [accr_sno_liq_liq_part, accr_rai_ice_sno_part, accr_rai_ice_rai_part]
    period: 6hours
  - short_name: [accr_rai_sno, evap, melt, dep_sub]
    period: 6hours
  - short_name: [w_rai, w_sno, w_liq, w_ice]
    period: 6hours

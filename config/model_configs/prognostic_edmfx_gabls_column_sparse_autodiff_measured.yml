# Layer 2 stability run: GABLS column with the measured padding mode built
# from rest. This is the leaner-win case (measured needs fewer colours than
# constant here); runtime_remeasure carries the transient-safety constant mask
# through spin-up, then switches to the lean measured mask of the developed
# state. debug_jacobian prints the Layer 1 :constant vs :measured comparison at
# the final state.
initial_condition: GABLS
turbconv: "prognostic_edmfx"
implicit_diffusion: true
approximate_linear_solve_iters: 2
use_auto_jacobian: true
update_jacobian_every: stage
auto_jacobian_padding_mode: measured
auto_jacobian_runtime_remeasure: true
ode_algo: "ARS222"
debug_jacobian: true
edmfx_entr_model: "Generalized"
edmfx_detr_model: "Generalized"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true
prognostic_tke: true
microphysics_model: "1M"
config: "column"
hyperdiff: ~
z_max: 400
x_elem: 2
y_elem: 2
z_elem: 8
z_stretch: false
dt: "10secs"
t_end: "5hours"
dt_save_state_to_disk: "30mins"
perturb_initstate: false
toml: [toml/prognostic_edmfx.toml]
netcdf_interpolation_num_points: [2, 2, 8]

# Initial and Boundary Conditions - Larcform1
#==========================================================================================#
# Atmosphere #
initial_condition: Larcform1
rayleigh_sponge: true

# Surface #
prognostic_surface: SlabOceanSST     # temp until "EisenmanSeaIce" is implemented
surface_setup: DefaultMoninObukhov   # "Larcform1_test"
disable_surface_flux_tendency: false

# Numerics
#==========================================================================================#

# Temporal
t_end: 20days                         # full run length is 20days
dt: 30secs
dt_rad: 30secs

# Spatial #
config: "column"
z_max: 9000.0
z_elem: 90
z_stretch: true
dz_bottom: 10.0                       # used by z_stretch
x_elem: 1
y_elem: 1

# Solver #
approximate_linear_solve_iters: 2
ode_algo: ARS343

# Model Components
#==========================================================================================#

# Parameters #
toml: [toml/larcform1_1M_edonly_edmfx.toml]

# Radiation #
rad: allskywithclear
insolation: larcform1

# Turbulence and EDMF #
turbconv: edonly_edmfx
implicit_diffusion: false
implicit_sgs_advection: false
edmfx_entr_model: "Generalized"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true

# Clouds #
cloud_model: grid_scale
microphysics_model: 1M

# Logging and Diagnostics
#==========================================================================================#
log_to_file: true
check_conservation: false
netcdf_output_at_levels: true
output_default_diagnostics: false
diagnostics:
#== Atmospheric State ==#
  - short_name: [ta, thetaa, pfull, rhoa, hus, hur, ts, tas]
    period: 1hours
    reduction_time: average
# ta/thetaa: air and potential temperature
# pfull/rhoa: pressure and density
# hus/hur: specific and relative humidity
# ts/tas: surface and near-surface air temperature
#== Winds & Dynamics ==#
  - short_name: [ua, va, wa]
    period: 1hours
    reduction_time: average
# ua/va/wa: zonal, meridional, and vertical velocity
#== Clouds & Condensates ==#
  - short_name: [cl, clw, cli, lwp, clivi]
    period: 1hours
    reduction_time: average
# cl: cloud fraction
# clw/cli: cloud liquid/ice mixing ratio
# lwp/clivi: liquid/ice water path
#== Radiation Fluxes ==#
  - short_name: [rlu, rld, rlut, rlus, rlds, rsdt, rlutcs, rldscs]
    period: 1hours
    reduction_time: average
# rlu/rld: atmospheric longwave up/down
# rlut/rlus/rlds: TOA upwelling and surface longwave fluxes
# rsdt: incoming shortwave at TOA; *cs: clear-sky diagnostics
#== Precipitation & Evaporation ==#
  - short_name: [pr, prsn, evspsbl, husra, hussn]
    period: 1hours
    reduction_time: average
# pr/prsn: total and snow precipitation rate
# evspsbl: evaporation rate
# husra/hussn: rain and snow mass fraction
#== Surface Heat Fluxes ==#
  - short_name: [hfss, hfls]
    period: 1hours
    reduction_time: average
# hfss/hfls: sensible and latent surface heat flux
#== Mass Flux Diagnostics (disabled for ED-only) ==#
#  - short_name: [arup, waup, taup, thetaaup, haup, husup, hurup, clwup, cliup, husraup, hussnup]
#    period: 10mins
#    reduction_time: average
# arup: updraft area fraction
# waup: updraft vertical velocity
# taup/thetaaup/haup: updraft thermodynamic state
# husup/hurup/clwup/cliup/husraup/hussnup: updraft moisture and condensates
#  - short_name: [waen, taen, thetaaen, haen, husen, huren, clwen, clien, husraen, hussnen]
#    period: 10mins
#    reduction_time: average
# waen: environmental vertical velocity
# taen/thetaaen/haen: environmental thermodynamic state
# husen/huren/clwen/clien/husraen/hussnen: environmental moisture and condensates
#  - short_name: [entr, detr]
#    period: 10mins
#    reduction_time: average
# entr/detr: entrainment and detrainment rates
#== ED & Turbulence Diagnostics ==#
  - short_name: [tke, lmix, bgrad, strain, edt, evu]
    period: 10mins
    reduction_time: average
# tke: turbulent kinetic energy
# lmix: mixing length; bgrad: buoyancy gradient
# strain: strain-rate magnitude
# edt/evu: eddy diffusivity and viscosity


# Single-column test config for the Beres NOGW single-column unit test
# (test/parameterized_tendencies/gravity_wave/non_orographic_gravity_wave/
#  test_beres_single_column.jl).
#
# Phase A injects a synthetic updraft into the EDMF cache and calls
# compute_beres_convective_heating!; Phase B fills the gw_* heating fields
# directly and calls non_orographic_gravity_wave_forcing. The config only needs
# to build a column simulation with prognostic EDMF + NOGW + Beres so that the
# column-mode cache is populated correctly.
initial_condition: "IsothermalProfile"
config: "column"
FLOAT_TYPE: "Float64"

# Tall column so stratospheric wave breaking has room to develop.
z_max: 50000.0
z_elem: 50
z_stretch: false
hyperdiff: ~

# Build/init only — the test bypasses the integrator and calls the forcing
# function directly.
dt: "400secs"
t_end: "400secs"
dt_save_state_to_disk: "Inf"
disable_surface_flux_tendency: true

# Prognostic EDMF — the EDMF mode we use going forward. Needed so the cache
# has Y.c.sgsʲs populated, even though the test bypasses the EDMF closure.
turbconv: "prognostic_edmfx"
prognostic_tke: true
edmfx_entr_model: "Generalized"
edmfx_detr_model: "Generalized"
edmfx_sgs_mass_flux: true
edmfx_sgs_diffusive_flux: true
edmfx_nh_pressure: true
edmfx_vertical_diffusion: true
edmfx_filter: true
implicit_diffusion: true
implicit_sgs_advection: true
implicit_sgs_entr_detr: true
implicit_sgs_nh_pressure: true
implicit_sgs_vertdiff: true
implicit_sgs_mass_flux: true
approximate_linear_solve_iters: 2
ode_algo: "ARS222"
microphysics_model: "0M"

# NOGW + Beres source.
non_orographic_gravity_wave: true
dt_nogw: "400secs"
nogw_beres_source: true
# Phase A reads the native source-shape diagnostics (gw_halfsine /
# gw_launch_flux / gw_c_centroid), which are only computed when detailed
# diagnostics are enabled.
nogw_beres_detailed_diagnostics: true

# Coarse phase-speed grid (nc = 51) + squall-line sigma_x = 2500 m for fast
# compilation in tests.
toml: [toml/nogw_beres_test.toml]

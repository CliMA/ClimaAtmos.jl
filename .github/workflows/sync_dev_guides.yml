# Scheduled sync of shared guides + dev config from CliMA/DeveloperGuides.
#
# This file is SCAFFOLDED once by sync/sync.jl, then owned by your repo — adjust
# the schedule or pinned `ref` as you like. It checks out DeveloperGuides, runs
# the idempotent sync, and opens a PR only when something actually changed.
#
# Prerequisite: Settings -> Actions -> General -> "Allow GitHub Actions to
# create and approve pull requests" must be enabled.

name: Sync Dev Guides
on:
  schedule:
    - cron: '0 0 1 * *'   # 1st of every month at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out DeveloperGuides
        uses: actions/checkout@v4
        with:
          repository: CliMA/DeveloperGuides
          ref: main          # pin to a tag (e.g. v1.0.0) for reproducible syncs
          path: .dev-guides-src

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Record source revision
        id: src
        run: echo "sha=$(git -C .dev-guides-src rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Sync
        run: julia .dev-guides-src/sync/sync.jl --target .

      - name: Remove source checkout
        run: rm -rf .dev-guides-src

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync-dev-guides
          delete-branch: true
          title: "chore: sync developer guides"
          commit-message: "chore: sync developer guides from CliMA/DeveloperGuides@${{ steps.src.outputs.sha }}"
          body: |
            Automated sync of shared guides and dev config from
            [CliMA/DeveloperGuides](https://github.com/CliMA/DeveloperGuides)
            at `${{ steps.src.outputs.sha }}`.

            Enforced files (`.pre-commit-config.yaml`, `.JuliaFormatter.toml`,
            `.dev/format/`, the formatter CI check, and `docs/dev-guides/`) are
            overwritten to match central. Scaffolded files (`AGENTS.md`, this
            workflow) are left untouched.

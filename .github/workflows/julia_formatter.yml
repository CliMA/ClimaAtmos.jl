# Canonical JuliaFormatter CI check for CliMA Julia packages.
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║ SYNCED FROM CliMA/DeveloperGuides — DO NOT EDIT IN THIS REPO.            ║
# ║ This file is overwritten on every dev-guides sync. To change it, open a  ║
# ║ PR at https://github.com/CliMA/DeveloperGuides (sync/managed/).          ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# The `version:` pin below must stay in lockstep with .dev/format/Project.toml.
name: JuliaFormatter

on:
  push:
    tags: '*'
  pull_request:
  merge_group:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/julia-format@v3
        with:
          version: '1' # Set `version` to '1.0.54' if you need to use JuliaFormatter.jl v1.0.54 (default: '1')
          suggestion-label: 'format-suggest' # leave this unset or empty to show suggestions for all PRs
